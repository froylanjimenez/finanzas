name: Sync eToro Portfolio

on:
  schedule:
    - cron: '0 */2 * * *'   # cada 2 horas
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch eToro portfolio
        env:
          ETORO_TOKEN: ${{ secrets.ETORO_TOKEN }}
          ETORO_PUBLIC_KEY: ${{ secrets.ETORO_PUBLIC_KEY }}
        run: |
          python3 - <<'EOF'
          import requests, json, os, sys, base64

          raw_token  = os.environ.get('ETORO_TOKEN', '').strip()
          public_key = os.environ.get('ETORO_PUBLIC_KEY', '').strip()
          if not raw_token:
              print("ERROR: ETORO_TOKEN secret not set")
              with open('portfolio_etoro.json', 'w') as f:
                  json.dump({"error": "token_not_configured"}, f)
              sys.exit(0)
          print(f"Public key present: {bool(public_key)}")

          # Decode the token to extract fields (it's base64-encoded JSON)
          try:
              padding = '=' * (4 - len(raw_token.replace('_','=')) % 4)
              decoded = base64.urlsafe_b64decode(raw_token.replace('__', '') + padding)
              token_data = json.loads(decoded)
              client_id = token_data.get('ci', '')
              api_key   = token_data.get('fk', '')
              print(f"Token decoded: ci={client_id[:8]}... eami={token_data.get('eami')}")
          except Exception as e:
              print(f"Token decode failed: {e} — using raw token as-is")
              client_id = ''
              api_key   = raw_token

          session = requests.Session()
          session.headers.update({
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'es,en;q=0.9',
              'Referer': 'https://www.etoro.com/portfolio',
              'Origin': 'https://www.etoro.com',
          })

          # Try multiple auth strategies (with and without public key header)
          pk_headers = {'X-App-Key': public_key} if public_key else {}
          auth_strategies = [
              {**pk_headers, 'Authorization': f'Bearer {raw_token}'},
              {**pk_headers, 'Authorization': raw_token},
              {**pk_headers, 'Authorization': f'Bearer {api_key}'},
              {'Authorization': f'Bearer {raw_token}'},   # sin public key como fallback
          ]

          # Step 1: get login data to find GCID (needed for portfolio URLs)
          gcid = None
          for auth in auth_strategies:
              try:
                  r = session.get(
                      'https://www.etoro.com/api/logininfo/v1.1/logindata',
                      headers=auth, timeout=15
                  )
                  print(f"logindata [{list(auth.keys())[0]}]: HTTP {r.status_code}")
                  if r.status_code == 200:
                      d = r.json()
                      gcid = d.get('RealCid') or d.get('Gcid') or d.get('realCid')
                      if gcid:
                          print(f"Got GCID: {gcid}")
                          session.headers.update(auth)
                          break
              except Exception as e:
                  print(f"logindata error: {e}")

          # Step 2: fetch portfolio using GCID or generic endpoints
          portfolio_endpoints = []
          if gcid:
              portfolio_endpoints += [
                  f'https://www.etoro.com/sapi/trade-real/users/{gcid}/portfolio',
                  f'https://www.etoro.com/sapi/trade-real/users/{gcid}/positions',
              ]
          portfolio_endpoints += [
              'https://www.etoro.com/sapi/trade-real/portfolio',
              'https://www.etoro.com/sapi/portfolios/v1/portfolio',
          ]

          positions = []
          for url in portfolio_endpoints:
              try:
                  r = session.get(url, timeout=15)
                  print(f"portfolio {url.split('/')[-1]}: HTTP {r.status_code}")
                  if r.status_code == 200:
                      d = r.json()
                      raw_pos = (
                          d.get('AggregatedPositions') or
                          d.get('positions') or
                          d.get('Positions') or
                          d.get('ClientPortfolio', {}).get('AggregatedPositions') or
                          []
                      )
                      if raw_pos:
                          print(f"Found {len(raw_pos)} positions")
                          for p in raw_pos:
                              ticker = (p.get('Ticker') or p.get('ticker') or
                                        p.get('Symbol') or p.get('InstrumentName') or '').upper()
                              positions.append({
                                  'Ticker':    ticker,
                                  'Amount':    p.get('Amount') or p.get('units') or 0,
                                  'Value':     p.get('Value') or p.get('CurrentValue') or p.get('NetValue') or 0,
                                  'NetProfit': p.get('NetProfit') or p.get('profit') or p.get('ProfitLoss') or 0,
                                  'Name':      p.get('Name') or p.get('InstrumentName') or ticker,
                              })
                          break
              except Exception as e:
                  print(f"portfolio error: {e}")

          import datetime
          output = {
              'updated': datetime.datetime.utcnow().isoformat() + 'Z',
              'positions': positions,
              'gcid': gcid,
              'auth_ok': gcid is not None or len(positions) > 0,
          }

          with open('portfolio_etoro.json', 'w') as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"\nGuardado: {len(positions)} posiciones (auth_ok={output['auth_ok']})")
          EOF

      - name: Commit portfolio data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_etoro.json
          git diff --staged --quiet && echo "Sin cambios" || (git commit -m "chore: update eToro portfolio data [skip ci]" && git push)
